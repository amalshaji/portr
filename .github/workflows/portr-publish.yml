name: Publish to prefix.dev

on:
  push:
    branches: ["main"]
    tags:
      - "v*"

jobs:
  build-and-publish:
    if: vars.DISABLE_PORTR_PUBLISH != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Highly recommended for matrix builds
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-64
            package: portr
          - os: ubuntu-latest
            target: linux-64
            package: portrd
          - os: macos-latest
            target: osx-64
            package: portr
          - os: macos-latest
            target: osx-64
            package: portrd
          - os: macos-latest
            target: osx-arm64
            package: portr
          - os: macos-latest
            target: osx-arm64
            package: portrd
          - os: windows-latest
            target: win-64
            package: portr
          - os: windows-latest
            target: win-64
            package: portrd

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Variables
        shell: bash
        run: |
          # Use a fallback if GITHUB_REF_NAME isn't a tag (e.g. on main branch)
          CLEAN_TAG=${GITHUB_REF_NAME#v}
          echo "STRIPPED_TAG=${CLEAN_TAG:-0.0.0}" >> $GITHUB_ENV

      - name: Build conda package
        uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          recipe-path: conda.recipe/recipe.yaml
          # upload-to-prefix is removed. We use upload-artifact instead.
          upload-artifact: true
          build-args: |
            --target-platform ${{ matrix.target }}
            --set PKG_NAME=${{ matrix.package }}
            --set PKG_VERSION=${{ env.STRIPPED_TAG }}

      - name: Publish to prefix.dev
        shell: bash
        run: |
          for pkg in output/**/*.conda; do
            rattler-build upload prefix -c ${{ github.repository_owner }} "$pkg"
          done
