name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  admin-tests:
    name: Admin Tests (Python)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('admin/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      working-directory: ./admin
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install

    - name: Set up test environment
      working-directory: ./admin
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/portr_test
        PORTR_SECRET_KEY: test-secret-key-for-testing
        PORTR_GITHUB_CLIENT_ID: test-client-id
        PORTR_GITHUB_CLIENT_SECRET: test-client-secret
      run: |
        poetry run python -m pytest --version

    - name: Run admin tests
      working-directory: ./admin
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/portr_test
        PORTR_SECRET_KEY: test-secret-key-for-testing
        PORTR_GITHUB_CLIENT_ID: test-client-id
        PORTR_GITHUB_CLIENT_SECRET: test-client-secret
      run: |
        poetry run python -m pytest tests/ -v --tb=short

    - name: Run admin tests with coverage
      working-directory: ./admin
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/portr_test
        PORTR_SECRET_KEY: test-secret-key-for-testing
        PORTR_GITHUB_CLIENT_ID: test-client-id
        PORTR_GITHUB_CLIENT_SECRET: test-client-secret
      run: |
        poetry run python -m coverage run -m pytest tests/
        poetry run python -m coverage report --skip-empty
        poetry run python -m coverage xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./admin/coverage.xml
        flags: admin
        name: admin-coverage

  server-tests:
    name: Server Tests (Go)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('tunnel/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download Go dependencies
      working-directory: ./tunnel
      run: go mod download

    - name: Run Go vet
      working-directory: ./tunnel
      run: go vet ./...

    - name: Run Go fmt check
      working-directory: ./tunnel
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "The following files are not formatted:"
          gofmt -s -l .
          exit 1
        fi

    - name: Run server tests
      working-directory: ./tunnel
      run: |
        go test -v -race -coverprofile=coverage.out ./internal/server/...

    - name: Run utils tests
      working-directory: ./tunnel
      run: |
        go test -v -race ./internal/utils/...

    - name: Generate coverage report
      working-directory: ./tunnel
      run: |
        go tool cover -html=coverage.out -o coverage.html
        go tool cover -func=coverage.out

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./tunnel/coverage.out
        flags: server
        name: server-coverage

  cli-tests:
    name: CLI Tests (Go)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('tunnel/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download Go dependencies
      working-directory: ./tunnel
      run: go mod download

    - name: Run CLI tests
      working-directory: ./tunnel
      run: |
        go test -v -race -short ./cmd/portr/...

    - name: Run client tests
      working-directory: ./tunnel
      run: |
        go test -v -race -short ./internal/client/...

    - name: Build CLI binary
      working-directory: ./tunnel
      run: |
        go build -o portr cmd/portr/*.go
        ./portr --version

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [admin-tests, server-tests, cli-tests]

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Install Python dependencies
      working-directory: ./admin
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install

    - name: Build Go binaries
      working-directory: ./tunnel
      run: |
        go mod download
        go build -o portrd cmd/portrd/main.go
        go build -o portr cmd/portr/*.go

    - name: Run integration tests
      working-directory: ./admin
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/portr_test
        PORTR_SECRET_KEY: test-secret-key-for-testing
        PORTR_GITHUB_CLIENT_ID: test-client-id
        PORTR_GITHUB_CLIENT_SECRET: test-client-secret
      run: |
        # Run basic integration tests that don't require the full system
        poetry run python -m pytest tests/ -v -k "integration" --tb=short || true

    - name: Test CLI help commands
      working-directory: ./tunnel
      run: |
        ./portr --help
        ./portr start --help
        ./portr auth --help
        ./portr http --help
        ./portr tcp --help

  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Install Python linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy

    - name: Run Python linting (admin)
      working-directory: ./admin
      run: |
        # Check code formatting
        black --check --diff .
        
        # Check imports
        isort --check-only --diff .
        
        # Run flake8
        flake8 --max-line-length=88 --extend-ignore=E203,W503 .
        
        # Run type checking (if mypy config exists)
        if [ -f "pyproject.toml" ] && grep -q "mypy" pyproject.toml; then
          mypy . || true
        fi

    - name: Run Go linting
      working-directory: ./tunnel
      run: |
        # Check formatting
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "The following files are not formatted:"
          gofmt -s -l .
          exit 1
        fi
        
        # Run go vet
        go vet ./...
        
        # Run staticcheck if available
        if command -v staticcheck &> /dev/null; then
          staticcheck ./...
        fi

  security:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Set up Python for security scanning
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install safety for Python security scanning
      run: pip install safety

    - name: Run safety check on admin dependencies
      working-directory: ./admin
      run: |
        pip install poetry
        poetry export -f requirements.txt --output requirements.txt
        safety check -r requirements.txt || true

    - name: Run govulncheck for Go security scanning
      working-directory: ./tunnel
      run: |
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./... || true